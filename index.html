<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menús | Rudy's Kafee</title>
    <link rel="stylesheet" href="style.css?v=28">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <button id="themeToggle" class="theme-toggle" aria-label="Cambiar modo oscuro">🌙</button>

    <header class="header">
        <div class="nav-content">
            <div class="logo-area">
                <a href="inicio.html"><img src="LogoPNG.png" alt="Rudy's Kafee" class="logo-imagen"></a>
            </div>

            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
           <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="inicio.html">Inicio</a></li>
                    <li><a href="index.html" style="color: var(--color-turquesa); font-weight: bold;">Menús</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="content-container">
            
            <div class="view-section active">
                <h2 class="section-title" style="text-align: center;">¿EN QUÉ HORARIO NOS VISITAS?</h2>
                <hr class="divider" style="margin: 10px auto 30px auto; width: 80px;">
                
                <div class="category-grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
                    
                    <div class="category-card" onclick="window.location.href='brunch.html'">
                        <div class="category-image" style="height: 200px;"><img src="brunch/PanHuevo.jpeg" alt="Brunch"></div>
                        <h3>Menú Brunch</h3>
                        <p>7:00 am a 2:00 pm</p>
                    </div>
                    
                    <div class="category-card" onclick="window.location.href='lunch.html'">
                        <div class="category-image" style="height: 200px;"><img src="fuerte/RibEye.jpeg" alt="Lunch"></div>
                        <h3>Menú Lunch</h3>
                        <p>2:00 pm a 10:00 pm</p>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom" style="margin-top: 0; padding-top: 0; border: none;">
            <p>&copy; 2026 por RUDY'S KAFEE. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');
        menuToggle.addEventListener('click', () => { mainNav.classList.toggle('active'); });

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if(document.body.classList.contains('dark-mode')) {
                themeToggle.innerText = '☀️';
            } else {
                themeToggle.innerText = '🌙';
            }
        });
    </script>
</body>
</html>
